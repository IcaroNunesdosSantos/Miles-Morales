<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    
    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/login.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="nav">
      <div id="nav_logo">
        <a href="index.html"><img src="" alt="" />MM</a>
      </div>
      <div id="nav_links">
        <a href="">Inicio</a>
        <a href="">Sobre</a>
        <a href="">Brooklyn</a>
        <a href="">Poderes</a>
      </div>
      <div>
        <a href="">Login</a>
        <span>|</span>
        <a id="cadastro" href="">Cadastro</a>
      </div>
    </div>

    <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <!-- Login -->
    <div class="Login">
      <div class="form">
        <h1>Login</h1>
        <div id="campos" class="nome">
          <img src="./assets/spider.png" alt="" />
          <input type="text" id="nome" />
        </div>
        <div id="campos" class="email">
          <img src="./assets/spider.png" alt="" />
          <input type="text" id="email" placeholder="email@example.com" />
        </div>
        <div id="campos" class="dtNasc">
          <img src="./assets/spider.png" alt="" />
          <input type="date" id="dtNasc" />
        </div>
        <div id="campos" class="cpf">
          <img src="./assets/spider.png" alt="" />
          <input type="text" id="cpf" />
        </div>
        <div id="campos" class="senha">
          <img src="./assets/padlock.png" alt="" />
          <input type="text" id="senha" placeholder="senha" />
        </div>

        <div>
          <button onclick="cadastrar()">Cadastre-se</button>
        </div>

        

        <div id="div_erros_login"></div>
        
      </div>
      <h3>Novo por aqui? <a href="">Cadastre-se</a></h3>
    </div>
  </body>
</html>

<script>
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome.value;
    var emailVar = email.value;
    var dtSemFormatacao = new Date(dtNasc.value);
    var dtNascVar = dtSemFormatacao.toLocaleDateString('sv-SE');
    var cpfVar = cpf.value;
    var senhaVar = senha.value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      dtNascVar == "" ||
      cpfVar == "" ||
      senhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        dtNascServer: dtNascVar,
        cpfServer: cpfVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
