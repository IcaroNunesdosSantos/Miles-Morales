<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    
    <script src="./js/sessao.js"></script>

    <link rel="stylesheet" href="./css/cadastro.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <div class="nav">
      <div id="nav_logo">
        <a class="logo bangers-regular" href="index.html"><img src="" alt="" />MM</a>
      </div>
      <div id="nav_links">
        <a href="">Inicio</a>
        <a href="">Sobre</a>
        <a href="">Brooklyn</a>
        <a href="">Poderes</a>
      </div>
      <div>
        <a href="">Login</a>
        <span>|</span>
        <a id="cadastro" href="">Cadastro</a>
      </div>
    </div>

    <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span style="color: white;" id="mensagem_erro"></span>
      </div>
    </div>

    <!-- Cadastro -->
    <div class="Cadastro">
      <div class="form">
        <h1 class="bangers-regular">Cadastre-se</h1>
        <div id="campos" class="nome">
          <img src="./assets/icons/user (1).png" alt="" />
          <input type="text" id="nome" placeholder="Nome Completo"/>
        </div>
        <div id="campos" class="email">
          <img src="./assets/icons/email.png" alt="" />
          <input type="text" id="email" placeholder="email@example.com" />
        </div>
        <div id="campos" class="dtNasc">
          <img src="./assets/icons/calendar.png" alt="" />
          <input type="date" id="dtNasc" placeholder="dd/mm/yyyy"/>
        </div>
        <div id="campos" class="gender">
          <img src="./assets/icons/gender (1).png" alt="" />
          <select name="gender" id="slc_gender">
              <option value=""></option>
              <option value="mas">Masculino</option>
              <option value="fem">Feminino</option>
              <option value="">Deseja não informar</option>
          </select>
        </div>
        <div id="campos" class="senha">
          <img src="./assets/icons/padlock.png" alt="" />
          <input type="password" id="senha" placeholder="Senha" />
        </div>

        <div>
          <button class="bangers-regular" onclick="cadastrar()">Cadastre-se</button>
        </div>

        

        <div id="div_erros_login"></div>
        
      </div>
      <h3>Já possui uma conta aqui? <a class="a-logar bangers-regular" href="login.html">Logar-se</a></h3>
    </div>
  </body>
</html>

<script>
  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome.value;
    var emailVar = email.value;
    var dtSemFormatacao = new Date(dtNasc.value);
    var dtNascVar = dtSemFormatacao.toLocaleDateString('sv-SE');
    var genderVar = slc_gender.value;
    var senhaVar = senha.value;

    if (
      nomeVar == "" ||
      emailVar == "" ||
      dtNascVar == "" ||
      senhaVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }

    if(emailVar.includes('@') && emailVar.endsWith('.com')){
      setInterval(sumirMensagem, 5000);
    } else {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        `(Insira um Email válido)`;

      finalizarAguardar();
      return false;
    }

    let caixaBaixa = senhaVar.toLowerCase;
    let caixaAlta = senhaVar.toUpperCase;
    let tamSenha = senhaVar.length;
    let criterios = 0;
    
    if(tamSenha >= 8){
      criterios++;
    }
    if(senhaVar != caixaBaixa){
      criterios++;
    }
    if(senhaVar != caixaAlta){
      criterios++;
    }

    if(criterios == 3){
      setInterval(sumirMensagem, 5000);
    }else if(criterios == 2){
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Senha média)";

      finalizarAguardar();
      return false;
    }else if(criterios == 1){
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Senha Fraca)";

      finalizarAguardar();
      return false;
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        dtNascServer: dtNascVar,
        genderServer: genderVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
