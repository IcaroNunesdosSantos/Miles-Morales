<script>
    function carregarGeneroMas(){
        fetch("/kpis/generoMas").then(res => res.json())
        .then(resultado => {
            let generoMas = 0;
            
             resultado.forEach(item => {
                generoMas = item.generoMas;
            });
            
            console.log(generoMas);
            
            document.getElementById(`kpi_spiderMan`).innerHTML =
                `${generoMas}`
            
        });
    }

    carregarGeneroMas()
    setInterval(carregarGeneroMas, 10000);

    function carregarGeneroFem(){
        fetch("/kpis/generoFem").then(res => res.json())
        .then(resultado => {
            let generoFem = 0;
            
             resultado.forEach(item => {
                generoFem = item.generoFem;
            });
            
            console.log(generoFem);
            
            document.getElementById(`kpi_spiderGirl`).innerHTML =
                `${generoFem}`
            
        });
    }

    carregarGeneroFem()
    setInterval(carregarGeneroFem, 10000);

    function carregarRanking() {
        fetch("/ranking/buscar").then(res => res.json())
        .then(resultado => {
            let usuarios = [];
            let pontuacoes = [];

             resultado.forEach(item => {
                usuarios.push(item.nome);
                pontuacoes.push(item.pontuacao);

            });
            
            console.log(usuarios);
            console.log(pontuacoes);

            for (let i = 0; i < usuarios.length; i++) {
                document.getElementById(`user${[i]}`).innerHTML = 
                    `${usuarios[i]}`
                document.getElementById(`rnk${[i]}`).innerHTML = 
                    `${pontuacoes[i]} Pontos`
            }

        });
    }

    carregarRanking()
    setInterval(carregarRanking, 10000);
</script>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Miles Morales', 'Gwen-Stassy', 'Peter B. Parker', `Porco-Aranha`, 'Jessica Drew', `Hobie(Aranha Punk)`, `Spider-Noir`],
        datasets: [{

            data: [12, 19, 3, 5, 2, 3, 2],

                '#ff101f',
                '#f8bbd0',
                '#ff0f00',
                '#BB0000',
                '#800000',
                '#884503',
                '#000000'
            ],

            borderWidth: 0
        }],
        
    },

    options: {
        responsive: true,

});
</script>
