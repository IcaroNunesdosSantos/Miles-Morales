<script>
    function carregarGeneroMas(){
        fetch("/kpis/generoMas").then(res => res.json())
        .then(resultado => {
            let generoMas = 0;
            
             resultado.forEach(item => {
                generoMas = item.generoMas;
            });
            
            console.log(generoMas);
            
            document.getElementById(`kpi_spiderMan`).innerHTML =
                `${generoMas}`
            
        });
    }

    carregarGeneroMas()
    setInterval(carregarGeneroMas, 10000);

    function carregarGeneroFem(){
        fetch("/kpis/generoFem").then(res => res.json())
        .then(resultado => {
            let generoFem = 0;
            
             resultado.forEach(item => {
                generoFem = item.generoFem;
            });
            
            console.log(generoFem);
            
            document.getElementById(`kpi_spiderGirl`).innerHTML =
                `${generoFem}`
            
        });
    }

    carregarGeneroFem()
    setInterval(carregarGeneroFem, 10000);

    function carregarRanking() {
        fetch("/ranking/buscar").then(res => res.json())
        .then(resultado => {
            let usuarios = [];
            let pontuacoes = [];

             resultado.forEach(item => {
                usuarios.push(item.nome);
                pontuacoes.push(item.pontuacao);

            });
            
            console.log(usuarios);
            console.log(pontuacoes);

            for (let i = 0; i < usuarios.length; i++) {
                document.getElementById(`user${[i]}`).innerHTML = 
                    `${usuarios[i]}`
                document.getElementById(`rnk${[i]}`).innerHTML = 
                    `${pontuacoes[i]} Pontos`
            }

        });
    }

    carregarRanking()
    setInterval(carregarRanking, 10000);
</script>

<script>

function carregarGraficoFavoritos() {
    fetch("/favs/buscar", { cache: 'no-store' })
        .then(function (response) {
            if (!response.ok) {
                throw new Error('Erro ao carregar os dados do gráfico');
            }
            return response.json();
        })
        .then(function (resultado) {
            console.log('Dados recebidos para o gráfico:', resultado);

            let labels = resultado.map(function (item) {
                return item.nome;
            });
            let valores = resultado.map(function (item) {
                return item.pontuacao;
            });

            let cores = [
                '#FF0000',
                '#FF0000',
                '#FF0000',
                '#FF0000',
                '#FF0000'
            ];

            let bordas = [
                '#FF0000',
                '#FF0000',
                '#FF0000',
                '#FF0000',
                '#FF0000'
            ];

            const data = {
                labels: labels,
                datasets: [{
                    label: 'Votos favoritos',
                    data: valores,
                    backgroundColor: cores,
                    borderColor: bordas,
                    borderWidth: 1
                }]
            };

            const config = {
                type: 'bar',
                data: data,
                options: {
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                precision: 0
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    }
                }
            };

            const ctx = document.getElementById('myChart').getContext('2d');

            if (window.myFavsChart) {
                window.myFavsChart.destroy();
            }

            window.myFavsChart = new Chart(ctx, config);
        })
        .catch(function (error) {
            console.error(error);
        });
}

carregarGraficoFavoritos();
setInterval(carregarGraficoFavoritos, 10000);
</script>
