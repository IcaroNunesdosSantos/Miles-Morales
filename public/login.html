<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/login.css">
    <script src="./js/sessao.js"></script>

</head>
<body>
    
        <!-- NAVBAR -->
        <div class="nav">
                <div id="nav_logo">
                    <a class="logo bangers-regular" href="index.html"><img src="" alt="">MM</a>
                </div>
                <div id="nav_links">
                    <a href="">Inicio</a>
                    <a href="">Sobre</a>
                    <a href="">Brooklyn</a>
                    <a href="">Poderes</a>
                </div>
                <div>
                    <a href="">Login</a>
                    <span>|</span>
                    <a id="cadastro" href="">Cadastro</a>
                </div>
        </div>

        <!-- Login -->
         <div class="Login">
            <div class="alerta_erro">
            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>
        </div>

            <div class="form">
                <h1 class="bangers-regular">Login</h1>
                <div id="campos" class="email">
                    <img src="./assets/user (1).png" alt="">
                    <input type="text" id="ipt_email" placeholder="email@example.com">
                </div>

                <div id="campos" class="senha">
                    <img src="./assets/padlock.png" alt="">
                    <input type="text" id="ipt_senha" placeholder="senha">
                </div>
                
                <div>
                    <button onclick="entrar()">Login</button>
                </div>

            </div>

            <div id="div_aguardar" class="loading-div">
                    <img src="./assets/infinite-mathematical-symbol.png" id="loading-gif">
                </div>

            <div id="div_erros_login"></div>

            <h3>Novo por aqui? <a class="a-cad bangers-regular" href="cadastro.html">Cadastre-se</a></h3>
         </div>

</body>
</html>

<script>


    function entrar() {
        aguardar();

        var emailVar = ipt_email.value;
        var senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    

                    setTimeout(function () {
                        window.location = "./index.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
